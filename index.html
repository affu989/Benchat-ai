<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BenChat AI</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f2f2f2;
    }

    .chat-box {
      height: 80vh;
      overflow-y: auto;
      padding: 10px;
      background: white;
    }

    .input-area {
      display: flex;
      position: fixed;
      bottom: 0;
      width: 100%;
    }

    input {
      flex: 1;
      padding: 15px;
      border: none;
      outline: none;
    }

    button {
      padding: 15px;
      border: none;
      background: #007bff;
      color: white;
    }
  </style>
</head>
<body>

  <div class="chat-box"></div>

  <div class="input-area">
    <input id="chatInput" placeholder="Type message..." />
    <button onclick="send()">Send</button>
  </div>

  <script src="script.js"></script>

</body>
</html>
